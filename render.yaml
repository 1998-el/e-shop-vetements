services:
  - type: static
    name: beldouze-ecommerce
    buildCommand: npm install && npm run build
    staticPath: dist

    headers:
      - path: /*
        name: Cache-Control
        value: "public, max-age=0, must-revalidate"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
        


